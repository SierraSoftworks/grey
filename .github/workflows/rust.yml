name: Rust
on:
  pull_request: {}
  push:
    branches:
      - main
  release:
    types: [published]

env:
  PROTOC_VERSION: "26.0"
  VERSION: "0.0.0-dev"

jobs:
  version:
    name: Start Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Generate Package Version (Release Tag)
        shell: pwsh
        if: github.event_name == 'release'
        run: Add-Content -Path $env:GITHUB_ENV -Value "VERSION=$('${{ github.event.release.tag_name }}'.substring(1))"

      - name: Set Package Version
        run: sed -i "s/^version\s*=\s*\".*\"/version = \"$VERSION\"/g" Cargo.toml

      - name: Stash Versioned Cargo.toml
        uses: actions/upload-artifact@v7
        with:
          name: cargofile
          path: Cargo.toml

  build-ui:
    name: Build User Interface
    runs-on: macos-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      # Install trunk before switching the default Rust toolchain so that the
      # rustup override doesn't interfere, and pass the GITHUB_TOKEN so that
      # binstall isn't rate-limited by the GitHub API (which forces a slow
      # build from source).
      - name: Install trunk (for building web UI)
        run: cargo binstall --no-confirm trunk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: llvm-tools-preview

      - name: Setup Cache
        uses: Swatinem/rust-cache@v2

      - name: Build UI using trunk
        run: trunk build --release

      - name: Upload build artifacts for use in other build stages
        uses: actions/upload-artifact@v7
        with:
          name: ui-build
          path: ./ui/dist

  test:
    name: Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    needs:
      - build-ui

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: install protoc
        uses: SierraSoftworks/setup-protoc@v3.0.1
        with:
          version: ${{ env.PROTOC_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: cargo install grcov
        uses: SierraSoftworks/setup-grcov@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch UI build artifacts
        uses: actions/download-artifact@v8
        with:
          name: ui-build
          path: ./ui/dist

      - name: Setup Cache
        uses: Swatinem/rust-cache@v2

      - name: Run Tests for Grey
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --no-fail-fast -p grey
        env:
            RUSTFLAGS: -Cinstrument-coverage

      - name: Run Tests for Grey UI
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --no-fail-fast -p grey-ui
        env:
          RUSTFLAGS: -Cinstrument-coverage

      - name: Run Tests for Grey API
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --no-fail-fast -p grey-api
        env:
          RUSTFLAGS: -Cinstrument-coverage

      - name: grcov
        run: grcov . --binary-path target/debug/deps/ -s . -t lcov --ignore-not-existing --ignore '../**' --ignore '/*' --ignore 'C:/' -o ./lcov.info

      - name: codecov upload
        uses: codecov/codecov-action@v7.0.0
        with:
          files: ./lcov.info

  build-app:
    name: ${{ matrix.os }}-${{ matrix.arch }}-release
    runs-on: ${{ matrix.run_on }}

    needs:
      - version
      - build-ui

    strategy:
      matrix:
        include:
          # Windows builds
          - arch: amd64
            os: windows
            run_on: windows-latest
            target: x86_64-pc-windows-msvc
            extension: .exe

          # Linux builds
          - arch: amd64
            run_on: ubuntu-latest
            os: linux
            target: x86_64-unknown-linux-gnu
            test: true
          - arch: "arm64"
            os: linux
            run_on: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
            flags: --features openssl_src

          # Apple macOS builds
          - arch: amd64
            run_on: macos-latest
            os: darwin
            target: x86_64-apple-darwin
          - arch: arm64
            run_on: macos-latest
            os: darwin
            target: aarch64-apple-darwin

    steps:
      - name: install protoc
        uses: SierraSoftworks/setup-protoc@v3.0.1
        if: ${{ !matrix.cross }}
        with:
          version: ${{ env.PROTOC_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: llvm-tools-preview

      - name: Check out code
        uses: actions/checkout@v6

      - name: Fetch Versioned Cargo.toml
        uses: actions/download-artifact@v8
        with:
          name: cargofile

      - name: Fetch UI build artifacts
        uses: actions/download-artifact@v8
        with:
          name: ui-build
          path: ./ui/dist

      - name: Setup Cache
        uses: Swatinem/rust-cache@v2
        with:
          # Give each matrix entry its own cache scope. Without this, every
          # entry in the matrix shares the same automatic cache key (derived
          # from the job name + Cargo.lock), so the jobs clobber one another's
          # caches and targets like aarch64 (built via cross) never get a
          # usable cache restored, forcing a full rebuild on every run.
          key: ${{ matrix.target }}

      - name: cargo build
        uses: actions-rs/cargo@v1.0.3
        with:
          use-cross: ${{ matrix.cross }}
          command: build
          args: --release --target ${{ matrix.target }} ${{ matrix.flags }}

      - name: Upload GitHub Release Artifacts
        uses: SierraSoftworks/gh-releases@v1.0.9
        if: github.event_name == 'release'
        with:
          files: "target/${{ matrix.target }}/release/grey${{ matrix.extension }} | grey-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.extension }}"
          token: ${{ secrets.GITHUB_TOKEN }}
          overwrite: "true"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        if: github.event_name == 'pull_request'
        with:
          name: grey-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.extension }}
          path: target/${{ matrix.target }}/release/grey${{ matrix.extension }}
