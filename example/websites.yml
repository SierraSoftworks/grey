---
ui:
  enabled: true
  listen: 127.0.0.1:3002

probes:
  - name: google.search
    policy:
      interval: 5s
      timeout: 2s
      retries: 3
    target: !Http
      url: https://google.com?q=grey+healthcheck+system
    checks:
      - http.status == 200
      - http.header.content-type == "text/html; charset=ISO-8859-1"
    tags:
      domain: google.com
      service: Search
  - name: bing.search
    policy:
      interval: 5s
      timeout: 2s
      retries: 3
    target: !Http
      url: https://www.bing.com
    checks:
      - http.status == 200
      - http.header.content-type == "text/html; charset=utf-8"
    tags:
      domain: bing.com
      service: Search
  - name: github.repo
    policy:
      interval: 5s
      timeout: 2s
      retries: 3
    target: !Http
      url: https://github.com/SierraSoftworks/grey
    checks:
      - http.status == 200
    tags:
      domain: github.com
      service: Coding
  - name: bender.production.script
    policy:
      interval: 10s
      timeout: 5s
      retries: 2
    tags:
      domain: bender.sierrasoftworks.com
      service: Scripting
    target: !Script
      args:
        - https://bender.sierrasoftworks.com
      code: |
        const resp = await fetch(`${arguments[0]}/api/v1/quote/bender`, {
          headers: {
            "Accept": "application/json",
            ...getTraceHeaders()
          }
        })

        output["http.status"] = resp.status

        if (resp.status == 200) {
          const quote = await resp.json()
          output["quote.who"] = quote.who
        }

    checks:
      - http.status == 200
      - quote.who == "Bender"
