---
ui:
  enabled: true
  listen: 127.0.0.1:3002

  title: Sierra Softworks (dev)

  links:
    - title: GitHub
      url: https://github.com/SierraSoftworks/grey

probes:
  - name: example.healthy
    policy:
      interval: 500ms
      timeout: 2s
      retries: 3
    target: !Dns
      domain: google.com
    checks:
      - dns.answers != []
    tags:
      domain: google.com
      service: internet
  - name: example.unhealthy
    policy:
      interval: 2s
      timeout: 2s
      retries: 1
    target: !Tcp
      host: example.com:443
    checks:
      - net.ip == "23.215.0.138"
    tags:
      domain: example.com
      service: failure
