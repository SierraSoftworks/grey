---
ui:
  enabled: true
  listen: 127.0.0.1:3002

probes:
  - name: google.search
    policy:
      interval: 5s
      timeout: 2s
      retries: 3
    target: !Http
      url: https://google.com?q=grey+healthcheck+system
    checks:
      - http.status == 200
      - http.header.content-type == "text/html; charset=ISO-8859-1"
    tags:
      domain: google.com
      service: Search
  - name: bing.search
    policy:
      interval: 5s
      timeout: 2s
      retries: 3
    target: !Http
      url: https://www.bing.com
    checks:
      - http.status == 200
      - http.header.content-type == "text/html; charset=utf-8"
    tags:
      domain: bing.com
      service: Search
  - name: github.repo
    policy:
      interval: 5s
      timeout: 2s
      retries: 3
    target: !Http
      url: https://github.com/SierraSoftworks/grey
    checks:
      - http.status == 200
    tags:
      domain: github.com
      service: Coding
